# NpmGuard — nginx reverse proxy
#
# Production: proxy to engine on :8000 (serves frontend from dist/)
#
# Install:
#   ln -sf /root/NpmGuard/deploy/nginx/npmguard.conf /etc/nginx/sites-enabled/npmguard.com
#   cp /root/NpmGuard/deploy/nginx/rate-limit.conf /etc/nginx/conf.d/
#   rm -f /etc/nginx/sites-enabled/default
#   certbot --nginx -d npmguard.com -d www.npmguard.com
#   nginx -t && systemctl reload nginx

server {
    server_name npmguard.com www.npmguard.com;

    # --- Security headers ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src https://js.stripe.com https://hooks.stripe.com; connect-src 'self' https://api.stripe.com; img-src 'self' data:;" always;

    server_tokens off;

    # --- Block sensitive paths ---
    location ~ /\.(env|git|svn|htaccess|htpasswd|DS_Store) {
        return 404;
    }
    location ~ ^/@(fs|vite|react-refresh) {
        return 404;
    }

    # --- SSE audit stream (no buffering, no rate limit) ---
    location ~ ^/(api/)?audit/[a-f0-9-]+/events$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }

    # --- Rate-limited audit/checkout ---
    location ~ ^/(api/)?(audit|checkout) {
        limit_req zone=audit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # --- Stripe webhook (no rate limit) ---
    location = /webhooks/stripe {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 1m;
    }

    # --- Everything else -> engine ---
    location / {
        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Start on port 80 only — certbot will add listen 443 ssl + certificates
    listen 80;
}
